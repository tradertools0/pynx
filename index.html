<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #071c34, #0a2d4d, #12395c);
    color: white;
    overflow-x: hidden;
}

.grid {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 35px 35px;
    z-index: -3;
}

.glow1 {
    position: fixed;
    width: 350px;
    height: 350px;
    background: rgba(0,180,255,0.12);
    border-radius: 50%;
    filter: blur(120px);
    top: 10%;
    left: 10%;
    z-index: -2;
}

.glow2 {
    position: fixed;
    width: 300px;
    height: 300px;
    background: rgba(0,255,255,0.08);
    border-radius: 50%;
    filter: blur(120px);
    bottom: 10%;
    right: 10%;
    z-index: -2;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 22px 60px;
}

.logo {
    font-size: 32px;
    color: #6ce6ff;
    font-weight: bold;
    letter-spacing: 4px;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 22px;
}

nav a {
    color: white;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 90px 20px 70px;
}

.hero h1 {
    font-size: 72px;
    color: #7cecff;
    margin-bottom: 10px;
}

.hero h2 {
    font-size: 34px;
    margin-bottom: 18px;
}

.hero p {
    font-size: 16px;
    opacity: 0.9;
}

section {
    padding: 55px 40px;
    text-align: center;
}

h2 {
    color: #7cecff;
    margin-bottom: 18px;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 22px;
    margin-top: 30px;
}

.card {
    width: 260px;
    padding: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

footer {
    text-align: center;
    padding: 25px;
    opacity: 0.6;
}

</style>
