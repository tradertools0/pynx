<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap');

:root{
    --bg:#050816;
    --bg2:#0a1022;
    --text:#edf2ff;
    --muted:#94a3b8;
    --blue:#5b8cff;
    --blue-soft:#78a6ff;
    --panel:rgba(255,255,255,0.035);
    --border:rgba(120,160,255,0.12);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at top,#0b1329 0%,#050816 58%);
    color:var(--text);
    overflow-x:hidden;
    letter-spacing:0.2px;
}

/* GRID */

.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(91,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,140,255,0.04) 1px, transparent 1px);
    background-size:42px 42px;
    z-index:-3;
    animation:gridMove 24s linear infinite;
}

@keyframes gridMove{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(42px);
    }
}

/* GLOW */

.glow1,
.glow2{
    position:fixed;
    border-radius:50%;
    filter:blur(140px);
    z-index:-2;
}

.glow1{
    width:360px;
    height:360px;
    background:rgba(91,140,255,0.14);
    top:8%;
    left:8%;
}

.glow2{
    width:300px;
    height:300px;
    background:rgba(60,120,255,0.10);
    bottom:8%;
    right:8%;
}

/* NAV */

nav{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 70px;
    backdrop-filter:blur(10px);
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    font-weight:700;
    color:var(--blue-soft);
    letter-spacing:8px;
    text-transform:uppercase;
}

nav ul{
    display:flex;
    list-style:none;
    gap:28px;
}

nav a{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
    transition:0.25s ease;
}

nav a:hover{
    color:var(--blue-soft);
}

/* HERO */

.hero{
    min-height:88vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 24px 90px;
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:90px;
    font-weight:700;
    letter-spacing:12px;
    margin-bottom:18px;
    color:#f4f7ff;
    text-shadow:0 0 18px rgba(91,140,255,0.12);
}

.hero h2{
    font-family:'Orbitron',sans-serif;
    font-size:22px;
    font-weight:500;
    letter-spacing:8px;
    margin-bottom:28px;
    color:var(--blue-soft);
}

.hero p{
    max-width:760px;
    font-size:17px;
    line-height:1.9;
    color:var(--muted);
}

/* SECTION */

section{
    padding:110px 70px;
    position:relative;
}

section h2{
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    letter-spacing:6px;
    color:#f4f7ff;
    margin-bottom:18px;
    text-align:center;
}

section p{
    text-align:center;
    color:var(--muted);
    line-height:1.8;
}

/* CARDS */

.cards{
    margin-top:50px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:28px;
}

.card{
    width:320px;
    padding:34px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter:blur(12px);
    transition:0.35s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(91,140,255,0.08),
        transparent
    );
    opacity:0;
    transition:0.35s ease;
}

.card:hover::before{
    opacity:1;
}

.card:hover{
    transform:translateY(-10px);
    border-color:rgba(120,160,255,0.28);
    box-shadow:0 0 28px rgba(91,140,255,0.08);
}

.card h3{
    font-family:'Orbitron',sans-serif;
    font-size:18px;
    letter-spacing:3px;
    margin-bottom:18px;
    color:var(--blue-soft);
}

.card p{
    text-align:left;
    color:var(--muted);
    font-size:15px;
    line-height:1.8;
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px 20px;
    color:rgba(255,255,255,0.45);
    font-size:14px;
    border-top:1px solid rgba(255,255,255,0.05);
}

/* MOBILE */

@media(max-width:768px){

    nav{
        padding:22px 24px;
    }

    .logo{
        font-size:20px;
        letter-spacing:4px;
    }

    nav ul{
        gap:16px;
    }

    .hero h1{
        font-size:52px;
        letter-spacing:6px;
    }

    .hero h2{
        font-size:16px;
        letter-spacing:4px;
    }

    section{
        padding:90px 24px;
    }

    .card{
        width:100%;
    }
}

</style>
